name: Update WC 2026 predictions

on:
  schedule:
    # Runs every 3 hours during the tournament (June 11 – July 19 2026).
    # GitHub Actions cron is always UTC.
    - cron: "0 */3 * * *"
  workflow_dispatch:  # also allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update pipeline
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python src/update.py --sims 10000

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.js docs/results.json docs/odds_snapshot.json data/processed/matches.csv
          git add docs/odds.json docs/upsets.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update predictions $(date -u +%Y-%m-%d\ %H:%M)"
          git push
